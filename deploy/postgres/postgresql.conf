# deploy/postgres/postgresql.conf
# Настройки PostgreSQL для production-like окружения

# ── Connection ────────────────────────────────────────────────────────────────
listen_addresses = '*'           # принимать соединения от всех контейнеров в Docker-сети
max_connections = 100
superuser_reserved_connections = 3

# ── Memory ────────────────────────────────────────────────────────────────────
shared_buffers = 256MB           # 25% от RAM (для 1GB RAM)
effective_cache_size = 768MB     # 75% от RAM
work_mem = 16MB
maintenance_work_mem = 64MB
wal_buffers = 16MB

# ── Query Planner ─────────────────────────────────────────────────────────────
random_page_cost = 1.1           # SSD
effective_io_concurrency = 200
default_statistics_target = 100

# ── WAL ───────────────────────────────────────────────────────────────────────
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB
checkpoint_completion_target = 0.9

# ── Logging ───────────────────────────────────────────────────────────────────
log_destination = stderr
logging_collector = off
log_timezone = UTC
log_min_duration_statement = 200   # Логировать запросы > 200ms
log_checkpoints = on
log_lock_waits = on
log_temp_files = 0
log_autovacuum_min_duration = 0

# ── Locale ────────────────────────────────────────────────────────────────────
timezone = UTC
lc_messages = en_US.UTF-8
lc_monetary = en_US.UTF-8
lc_numeric = en_US.UTF-8
lc_time = en_US.UTF-8

# ── Autovacuum ────────────────────────────────────────────────────────────────
autovacuum = on
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02

# ── Misc ──────────────────────────────────────────────────────────────────────
track_counts = on
track_activities = on
track_io_timing = on
