# --------------------------------------------------------------------------
# FocusForge — Docker Compose
# --------------------------------------------------------------------------
# Сервисы:
#   focusforge  — основное приложение C++ (userver)
#   postgres    — PostgreSQL 15
#   mongo       — MongoDB 7
#   redis       — Redis 7
#   nginx       — Reverse proxy
#   migrator    — Одноразовый контейнер применения миграций
# --------------------------------------------------------------------------

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

services:
  # --------------------------------------------------------------------------
  # PostgreSQL
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: focusforge
      POSTGRES_USER: focusforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret_pg_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U focusforge -d focusforge" ]
      interval: 5s
      timeout: 5s
      retries: 10
    logging: *default-logging
    networks:
      - focusforge_net

  # --------------------------------------------------------------------------
  # MongoDB
  # --------------------------------------------------------------------------
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: focusforge
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-secret_mongo_password}
      MONGO_INITDB_DATABASE: focusforge
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    ports:
      - "27017:27017"
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok" ]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging
    networks:
      - focusforge_net

  # --------------------------------------------------------------------------
  # Redis
  # --------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: >
      redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging
    networks:
      - focusforge_net

  # --------------------------------------------------------------------------
  # Redis Sentinel (topology discovery for userver)
  # --------------------------------------------------------------------------
  redis-sentinel:
    image: redis:7.2-alpine
    restart: unless-stopped
    entrypoint: >
      /bin/sh -c "
        echo 'sentinel monitor focusforge redis 6379 1' > /tmp/sentinel.conf &&
        echo 'sentinel resolve-hostnames yes' >> /tmp/sentinel.conf &&
        echo 'sentinel down-after-milliseconds focusforge 5000' >> /tmp/sentinel.conf &&
        echo 'sentinel failover-timeout focusforge 10000' >> /tmp/sentinel.conf &&
        echo 'sentinel parallel-syncs focusforge 1' >> /tmp/sentinel.conf &&
        redis-sentinel /tmp/sentinel.conf
      "
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "26379:26379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "26379", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - focusforge_net

  # --------------------------------------------------------------------------
  # DB Migrator (runs once)
  # --------------------------------------------------------------------------
  migrator:
    image: postgres:15-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: focusforge
      PGUSER: focusforge
      PGPASSWORD: ${POSTGRES_PASSWORD:-secret_pg_password}
    volumes:
      - ./migrations:/migrations:ro
      - ./deploy/migrator/run_migrations.sh:/run_migrations.sh:ro
    entrypoint: [ "/bin/sh", "/run_migrations.sh" ]
    networks:
      - focusforge_net

  # --------------------------------------------------------------------------
  # FocusForge Application
  # --------------------------------------------------------------------------
  focusforge:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    #    target: runtime
    #    args:
    #      BUILD_TYPE: Release
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      redis-sentinel:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      # Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-webhook_secret}
      # PostgreSQL
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: focusforge
      POSTGRES_USER: focusforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret_pg_password}
      # MongoDB
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DB: focusforge
      MONGO_USER: focusforge
      MONGO_PASSWORD: ${MONGO_PASSWORD:-secret_mongo_password}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-secret_redis_password}
      # App
      APP_ENV: production
      LOG_LEVEL: info
    volumes:
      - ./configs:/app/configs:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:8080/health/live" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    networks:
      - focusforge_net

  # --------------------------------------------------------------------------
  # Tunnel — SSH reverse proxy через localhost.run (без аккаунта, без rate-limit).
  # Автоматически получает HTTPS-URL и регистрирует Telegram webhook.
  # При обрыве — переподключается и перерегистрирует новый URL.
  # --------------------------------------------------------------------------
  tunnel:
    build:
      context: ./deploy/tunnel
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      focusforge:
        condition: service_healthy
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
    networks:
      - focusforge_net
    logging: *default-logging

  # --------------------------------------------------------------------------
  # Nginx
  # --------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      focusforge:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    logging: *default-logging
    networks:
      - focusforge_net

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  nginx_certs:
  nginx_logs:

networks:
  focusforge_net:
    driver: bridge
