# docker/redis/redis.conf

# ── Persistence ───────────────────────────────────────────────────────────────
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB snapshots как резерв
save 900 1
save 300 10
save 60 10000

# ── Memory ────────────────────────────────────────────────────────────────────
maxmemory 512mb
maxmemory-policy allkeys-lru
maxmemory-samples 10

# ── Network ───────────────────────────────────────────────────────────────────
bind 0.0.0.0
protected-mode yes
port 6379
tcp-backlog 511
timeout 300
tcp-keepalive 300

# ── Logging ───────────────────────────────────────────────────────────────────
loglevel notice
logfile ""

# ── Security ──────────────────────────────────────────────────────────────────
# Пароль задаётся через env в docker-compose (requirepass ${REDIS_PASSWORD})

# ── Performance ───────────────────────────────────────────────────────────────
hz 20
dynamic-hz yes
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ── Slow log ─────────────────────────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 256
