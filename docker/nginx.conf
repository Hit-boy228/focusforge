# ==============================================================================
# FocusForge — Nginx Configuration
# docker/nginx.conf
# ==============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Структурированный лог с request_id
    log_format json_combined escape=json
        '{'
        '"time":"$time_iso8601",'
        '"request_id":"$request_id",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain application/json;

    # Генерируем уникальный request_id
    map $http_x_request_id $request_id {
        default $http_x_request_id;
        ""      $request_id;
    }

    # Rate limiting на уровне Nginx (первый рубеж)
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=api:10m     rate=300r/m;

    # Upstream — userver приложение
    upstream focusforge_app {
        server focusforge:8080;
        keepalive 64;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Health checks проходят без redirect (для Docker healthcheck)
        location /health {
            proxy_pass http://focusforge_app;
            proxy_set_header Host $host;
            access_log off;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name your-domain.com;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options          DENY;
        add_header X-Content-Type-Options   nosniff;
        add_header X-XSS-Protection         "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Propagate request_id
        add_header X-Request-Id $request_id always;

        # ── Telegram Webhook ──────────────────────────────────────────────────
        location ~ ^/webhook/ {
            limit_req zone=webhook burst=50 nodelay;
            limit_req_status 429;

            proxy_pass         http://focusforge_app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Request-Id      $request_id;

            proxy_read_timeout  10s;
            proxy_send_timeout  10s;
            proxy_connect_timeout 5s;

            # Telegram отправляет JSON, max 5MB
            client_max_body_size 5m;
        }

        # ── Internal API ──────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=100 nodelay;

            proxy_pass         http://focusforge_app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Request-Id    $request_id;
        }

        # ── Health / Metrics (только с localhost / внутренней сети) ──────────
        location /health {
            allow 127.0.0.1;
            allow 172.16.0.0/12;  # Docker networks
            deny all;

            proxy_pass http://focusforge_app;
            access_log off;
        }

        location /metrics {
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;

            proxy_pass http://focusforge_app;
            access_log off;
        }

        # Запрещаем всё остальное
        location / {
            return 404;
        }
    }
}
