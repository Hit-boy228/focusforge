# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Format check ──────────────────────────────────────────────────────────────
  format:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key \
            | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-18 main" \
            | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update -qq
          sudo apt-get install -y clang-format-18
      - name: Check formatting
        run: CLANG_FORMAT=clang-format-18 ./scripts/format.sh --check

  # ── Build & Unit tests ────────────────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-22.04
    container:
      image: ghcr.io/userver-framework/ubuntu-22.04-userver:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Conan
        run: pip install conan==2.0.17

      - name: Create Conan default profile
        run: conan profile detect --force

      - name: Configure (CMake + Conan)
        run: |
          conan install . --build=missing -s build_type=Release
          cmake --preset conan-release \
                -DBUILD_TESTS=ON \
                -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build/Release -j$(nproc)

      - name: Run unit tests
        run: ./scripts/test_unit.sh
        env:
          BUILD_DIR: build/Release

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test_results_unit.xml

  # ── Lint (clang-tidy) ─────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-22.04
    needs: build-and-test
    container:
      image: ghcr.io/userver-framework/ubuntu-22.04-userver:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Conan
        run: pip install conan==2.0.17
      - name: Create Conan default profile
        run: conan profile detect --force
      - name: Run clang-tidy
        run: |
          conan install . --build=missing -s build_type=Release
          cmake --preset conan-release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
          ./scripts/lint.sh
        env:
          BUILD_DIR: build/Release

  # ── Docker build validation ───────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-22.04
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t focusforge:ci .
      - name: Validate image starts
        run: |
          docker run --rm --entrypoint /bin/sh focusforge:ci \
              -c "ls /app/focusforge && echo 'Binary OK'"
